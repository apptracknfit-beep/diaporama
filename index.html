<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5" />
  <title>Ombeline ♥ — 18 ans</title>
  <meta name="description" content="Une histoire d'anniversaire en trois chapitres, rien que pour toi." />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#FFD700" />

  <!-- iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Ombeline" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300;1,500&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- App source (order matters: utils → components → games → screens → app → boot) -->
  <script type="text/babel" data-presets="react" src="src/utils.jsx"></script>

  <script type="text/babel" data-presets="react" src="src/games/CatchNon.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/games/Memory.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/games/CatchCactus.jsx"></script>

  <script type="text/babel" data-presets="react" src="src/screens/Intro.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/screens/Chapter1.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/screens/Chapter2.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/screens/Chapter3.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/screens/Gift.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/screens/Games.jsx"></script>

  <script type="text/babel" data-presets="react" src="src/App.jsx"></script>

  <script type="text/babel" data-presets="react">
    // Boot — wait until every component is on window
    (function boot() {
      const required = ['App', 'Intro', 'Chapter1', 'Chapter2', 'Chapter3', 'Gift', 'Games', 'CatchNon', 'Memory', 'CatchCactus'];
      const missing = required.filter((n) => !window[n]);
      if (missing.length) {
        return setTimeout(boot, 30);
      }
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<window.App />);
    })();
  </script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
